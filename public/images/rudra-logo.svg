<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 720" role="img" aria-labelledby="title desc">
  <title id="title">Dr. Rudra Wellness Centre</title>
  <desc id="desc">Circular magenta wellness centre logo with Tamil wellness message</desc>
  <defs>
    <path id="topArc" d="M 78 360 A 282 282 0 0 1 642 360"/>
    <path id="bottomArc" d="M 92 420 A 274 274 0 0 0 628 420"/>
  </defs>
  <circle cx="360" cy="360" r="346" fill="#d40078"/>
  <circle cx="360" cy="360" r="272" fill="none" stroke="#fff" stroke-width="9"/>
  <text fill="#fff" font-family="Arial,Helvetica,sans-serif" font-weight="800" font-size="48" letter-spacing="1.5">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">Dr. RUDRA WELLNESS CENTRE</textPath>
  </text>
  <text x="360" y="333" text-anchor="middle" fill="#fff" font-family="Noto Sans Tamil,Latha,Arial,sans-serif" font-weight="800" font-size="92">உணவே</text>
  <text x="360" y="442" text-anchor="middle" fill="#fff" font-family="Noto Sans Tamil,Latha,Arial,sans-serif" font-weight="800" font-size="92">மருந்து</text>
  <text fill="#fff" font-family="Noto Sans Tamil,Latha,Arial,sans-serif" font-weight="700" font-size="38" letter-spacing="1">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">Dr. ருத்ரா ஆரோக்கிய மையம்</textPath>
  </text>
</svg>